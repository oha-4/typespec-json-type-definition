version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      typespec:
        patterns:
          - "@typespec/*"
      dev-dependencies:
        dependency-type: development
    ignore:
      # @types/node tracks the Node runtime; keep it on the lowest supported
      # major (Node 22, see "engines") instead of chasing the latest.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
